<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mossburger Crew Rating Calculator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.2);
            --accent-red: #ef4444;
            --border-color: #334155;
            --input-bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            gap: 24px;
            max-width: 850px;
            width: 100%;
        }

        .calculator-container, .sidebar-container {
            background-color: var(--card-bg);
            padding: 32px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        h2, h3 {
            text-align: center;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        h2 {
            font-size: 22px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }

        h3 {
            font-size: 20px;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="date"]:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-green);
            color: #052e16;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #4ade80;
        }

        button:active {
            transform: scale(0.98);
        }

        .results {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px dashed var(--border-color);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-size: 15px;
            color: var(--text-muted);
        }

        .result-item span:last-child {
            font-family: monospace;
            font-size: 16px;
            color: var(--text-main);
            font-weight: 600;
        }

        .total-points {
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }

        .total-points span:first-child {
            color: var(--text-main);
        }

        .total-points span:last-child {
            font-size: 22px;
            color: var(--accent-green);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .timer-label {
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }

        .timer-display {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            color: var(--accent-red);
            margin: 16px 0 28px 0;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(239, 68, 68, 0.2);
        }

        .timezone-info {
            background: var(--input-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-grow: 1;
            justify-content: center;
        }

        .time-box {
            text-align: center;
        }

        .time-box span {
            font-family: monospace;
            font-size: 18px;
            color: var(--text-main);
            font-weight: 600;
            display: inline-block;
            margin-top: 4px;
        }

        /* Responsive layout for smaller screens */
        @media (max-width: 720px) {
            .main-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="calculator-container">
        <h2>Mossburger Crew Rating Calculator</h2>
        
        <div class="form-group">
            <label for="joinDate">Enter Join Date</label>
            <input type="date" id="joinDate">
        </div>
        
        <button onclick="calculatePoints()">Calculate Required Points</button>
        
        <div class="results" id="resultsSection" style="display: none;">
            <div class="result-item">
                <span>Total Days Tracked:</span>
                <span id="daysCount">0</span>
            </div>
            <div class="result-item">
                <span>Daily Quest Points (135/day):</span>
                <span id="dailyPoints">0</span>
            </div>
            <div class="result-item">
                <span>Weekly Quest Points (450/week):</span>
                <span id="weeklyPoints">0</span>
            </div>
            <div class="result-item total-points">
                <span>Total Expected Points:</span>
                <span id="totalPoints">0</span>
            </div>
        </div>
    </div>

    <div class="sidebar-container">
        <h3>Quest Reset Tracker</h3>
        
        <div class="timer-label">Next Quest Reset In</div>
        <div class="timer-display" id="countdownTimer">00h 00m 00s</div>
        
        <div class="timezone-info">
            <div class="time-box">
                <label>Your Local Reset Time</label>
                <span id="localResetTime">Loading...</span>
            </div>
            
            <div class="time-box" style="border-top: 1px solid var(--border-color); padding-top: 16px;">
                <label>Reset Time in UTC</label>
                <span>23:00 UTC</span>
            </div>
        </div>
    </div>
</div>

<script>
    function getNextResetTarget() {
        const now = new Date();
        
        // 7:00 PM CDT is exactly 23:00 UTC
        const targetUTC = Date.UTC(
            now.getUTCFullYear(),
            now.getUTCMonth(),
            now.getUTCDate(),
            23, 0, 0, 0
        );
        
        let targetDate = new Date(targetUTC);
        
        // If 23:00 UTC has already passed today, target tomorrow
        if (now >= targetDate) {
            targetDate.setUTCDate(targetDate.getUTCDate() + 1);
        }
        
        return targetDate;
    }

    function updateCountdown() {
        const now = new Date();
        const target = getNextResetTarget();
        const diff = target - now;

        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        const hDisplay = String(hours).padStart(2, '0');
        const mDisplay = String(minutes).padStart(2, '0');
        const sDisplay = String(seconds).padStart(2, '0');

        document.getElementById('countdownTimer').innerText = `${hDisplay}h ${mDisplay}m ${sDisplay}s`;
    }

    function displayLocalResetTime() {
        const target = getNextResetTarget();
        const options = { 
            hour: '2-digit', 
            minute: '2-digit', 
            timeZoneName: 'short' 
        };
        const localTimeString = target.toLocaleTimeString(undefined, options);
        document.getElementById('localResetTime').innerText = localTimeString;
    }

    function calculatePoints() {
        const joinDateInput = document.getElementById('joinDate').value;
        
        if (!joinDateInput) {
            alert("Please select a valid join date.");
            return;
        }

        const joinDate = new Date(joinDateInput);
        joinDate.setHours(12, 0, 0, 0);
        
        const today = new Date();
        today.setHours(12, 0, 0, 0);

        if (joinDate > today) {
            alert("Join date cannot be in the future.");
            return;
        }

        const timeDiff = today.getTime() - joinDate.getTime();
        const daysPassed = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
        const weeksPassed = Math.floor(daysPassed / 7);

        const pointsPerDay = 9 * 15; 
        const pointsPerWeek = 9 * 50;

        const calculatedDailyPoints = daysPassed * pointsPerDay;
        const calculatedWeeklyPoints = weeksPassed * pointsPerWeek;
        const totalPointsRequired = calculatedDailyPoints + calculatedWeeklyPoints;

        document.getElementById('daysCount').innerText = daysPassed;
        document.getElementById('dailyPoints').innerText = calculatedDailyPoints.toLocaleString();
        document.getElementById('weeklyPoints').innerText = calculatedWeeklyPoints.toLocaleString();
        document.getElementById('totalPoints').innerText = totalPointsRequired.toLocaleString();
        
        document.getElementById('resultsSection').style.display = 'block';
    }

    // Initialize and run loops
    displayLocalResetTime();
    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>

</body>
</html>
